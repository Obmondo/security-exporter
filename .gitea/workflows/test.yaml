name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
